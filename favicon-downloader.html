<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vamsi Allu — Favicon Downloader</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --navy:#0B0F1A;
    --navy2:#111827;
    --gold:#C9A84C;
    --gold2:#E8C97A;
    --muted:#8A8D9F;
    --border:rgba(255,255,255,0.08);
    --green:#22c55e;
  }
  body{
    font-family:'Inter',sans-serif;
    background:var(--navy);
    color:#fff;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:2rem;
  }
  .card{
    background:#111827;
    border:1px solid var(--border);
    border-radius:16px;
    padding:2.5rem;
    max-width:480px;
    width:100%;
    text-align:center;
  }
  .label{
    font-size:0.7rem;
    font-weight:600;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:1.2rem;
  }
  h1{
    font-family:'Playfair Display',serif;
    font-size:1.5rem;
    color:#fff;
    margin-bottom:0.4rem;
  }
  h1 span{color:var(--gold);}
  .sub{
    font-size:0.82rem;
    color:var(--muted);
    margin-bottom:2rem;
    line-height:1.6;
  }

  .preview-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:2rem;
    margin-bottom:2rem;
  }
  .preview-item{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:0.5rem;
  }
  .preview-item span{
    font-size:0.7rem;
    color:var(--muted);
    letter-spacing:0.1em;
    text-transform:uppercase;
  }
  canvas{border-radius:50%;display:block;}

  .divider{height:1px;background:var(--border);margin:1.5rem 0;}

  .btn-group{display:flex;flex-direction:column;gap:0.75rem;}
  .btn{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0.9rem 1.2rem;
    border-radius:10px;
    border:1px solid var(--border);
    background:#1A2235;
    color:#fff;
    font-family:'Inter',sans-serif;
    font-size:0.88rem;
    font-weight:500;
    cursor:pointer;
    transition:all 0.2s;
    text-decoration:none;
  }
  .btn:hover{background:#243048;border-color:var(--gold);color:var(--gold);}
  .btn .left{display:flex;align-items:center;gap:0.6rem;}
  .btn .size-tag{
    font-size:0.72rem;
    color:var(--muted);
    background:rgba(255,255,255,0.05);
    padding:0.2rem 0.5rem;
    border-radius:4px;
  }
  .btn .arrow{color:var(--gold);font-size:1rem;}

  .note{
    margin-top:1.5rem;
    font-size:0.75rem;
    color:var(--muted);
    line-height:1.7;
    background:rgba(201,168,76,0.06);
    border:1px solid rgba(201,168,76,0.15);
    border-radius:8px;
    padding:0.9rem 1rem;
    text-align:left;
  }
  .note strong{color:var(--gold2);}

  .success{color:var(--green);font-size:0.78rem;margin-top:0.4rem;display:none;}
</style>
</head>
<body>
<div class="card">
  <p class="label">Favicon Export Tool</p>
  <h1>Vamsi <span>Allu</span></h1>
  <p class="sub">Download your favicon in all required sizes.<br/>Upload these files to the root of vamsiallu.com.</p>

  <div class="preview-row">
    <div class="preview-item">
      <canvas id="c32" width="32" height="32"></canvas>
      <span>32px</span>
    </div>
    <div class="preview-item">
      <canvas id="c64" width="64" height="64"></canvas>
      <span>64px</span>
    </div>
    <div class="preview-item">
      <canvas id="c180" width="180" height="180" style="width:60px;height:60px;border-radius:14px;"></canvas>
      <span>180px</span>
    </div>
  </div>

  <div class="divider"></div>

  <div class="btn-group">
    <button class="btn" onclick="download(32,'favicon-32x32.png')">
      <span class="left">⬇ favicon-32x32.png <span class="size-tag">Browser tab</span></span>
      <span class="arrow">→</span>
    </button>
    <button class="btn" onclick="download(64,'favicon.png')">
      <span class="left">⬇ favicon.png <span class="size-tag">General use</span></span>
      <span class="arrow">→</span>
    </button>
    <button class="btn" onclick="download(180,'apple-touch-icon.png')">
      <span class="left">⬇ apple-touch-icon.png <span class="size-tag">iOS homescreen</span></span>
      <span class="arrow">→</span>
    </button>
  </div>

  <div class="note">
    <strong>After downloading:</strong> upload all 3 files to the <strong>root folder</strong> of your website (same level as index.html). Then paste the code snippet below into your &lt;head&gt;.
  </div>
</div>

<script>
function drawFavicon(canvas, size) {
  const ctx = canvas.getContext('2d');
  const r = size / 2;

  // Background circle
  ctx.beginPath();
  ctx.arc(r, r, r, 0, Math.PI * 2);
  ctx.fillStyle = '#0B0F1A';
  ctx.fill();

  // "VA" text
  ctx.fillStyle = '#C9A84C';
  ctx.font = `bold ${size * 0.44}px Georgia, serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('VA', r, r + size * 0.04);
}

const sizes = [32, 64, 180];
sizes.forEach(s => {
  const canvas = document.getElementById('c' + s);
  drawFavicon(canvas, s);
});

function download(size, filename) {
  const canvas = document.getElementById('c' + size);
  const link = document.createElement('a');
  link.download = filename;
  link.href = canvas.toDataURL('image/png');
  link.click();
}
</script>
</body>
</html>
